<div class="pwd-wrapper">
  <img src="/foto/admin-bg.jpg?v=2" alt="" class="pwd-bg">
  <div class="pwd-overlay"></div>

  <div class="container page-container">
    <h2>Password dimenticata</h2>
    <p class="subtitle" style="text-align: center; color: rgba(255, 255, 255, 0.7); margin-bottom: 24px; font-size: 14px; line-height: 1.5;">
      Inserisci l'email associata al tuo account.
      Se i dati sono corretti, riceverai una mail per reimpostare la password.
    </p>

    <form #forgotForm="ngForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email"
               placeholder="Inserisci la tua email" [(ngModel)]="email" required email>
      </mat-form-field>

      <p class="msg error" [hidden]="!errore" style="color: #ff6b6b; font-size: 14px; text-align: center; margin: 5px 0;">
        {{ errore }}
      </p>

      <p class="msg success" [hidden]="!messaggio" style="color: #51cf66; font-size: 14px; text-align: center; margin: 5px 0;">
        {{ messaggio }}
      </p>

      <div class="button-group">
        <button class="btn btn-primary" type="submit"
                [disabled]="!forgotForm.valid || loading">
          {{ loading ? 'Invio in corso...' : 'Invia richiesta' }}
        </button>

        <button type="button" class="btn btn-secondary" (click)="tornaAlLogin()">
          Torna al login
        </button>
      </div>
    </form>
  </div>
</div>
