<div class="forgot-wrapper">
  <div class="forgot-card">
    <h1>Password dimenticata</h1>
    <p class="subtitle">
      Inserisci l’email associata al tuo account.
      Se i dati sono corretti, riceverai una mail per reimpostare la password.
    </p>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        class="text-input"
        [value]="email"
        (input)="email = $any($event.target).value"
        autocomplete="email"
        inputmode="email"
      />
    </div>

    <p class="msg error" [hidden]="!errore">
      {{ errore }}
    </p>

    <p class="msg success" [hidden]="!messaggio">
      {{ messaggio }}
    </p>

    <div class="actions">
      <button
        type="button"
        class="btn-primary"
        [disabled]="loading"
        (click)="onSubmit()"
      >
        {{ loading ? 'Invio in corso...' : 'Invia richiesta' }}
      </button>

      <button
        type="button"
        class="btn-link"
        (click)="tornaAlLogin()"
      >
        Torna al login
      </button>
    </div>
  </div>
</div>
