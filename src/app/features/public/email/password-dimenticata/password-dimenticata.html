<div class="forgot-wrapper">
  <div class="forgot-card">
    <h1>Password dimenticata</h1>
    <p class="subtitle">
      Inserisci il tuo username e l'email associata all'account. Ti invieremo le istruzioni per reimpostare la password.
    </p>

    <form #forgotForm="ngForm" (ngSubmit)="onSubmit(forgotForm)">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          class="text-input"
          ngModel
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="text-input"
          ngModel
          required
        />
      </div>

      <p class="msg" *ngIf="msg">{{ msg }}</p>

      <div class="actions">
        <button type="submit" class="btn-primary" [disabled]="!forgotForm.valid || loading">
          {{ loading ? 'Invio in corso...' : 'Invia richiesta' }}
        </button>

        <button type="button" class="btn-link" (click)="tornaAlLogin()">
          Torna al login
        </button>
      </div>
    </form>
  </div>
</div>
