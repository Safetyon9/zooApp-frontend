<div class="forgot-wrapper">
  <div class="forgot-card">
    <h1>Reimposta password</h1>
    <p class="subtitle">
      Inserisci la nuova password del tuo account.
    </p>

    <div class="form-group">
      <label for="newPwd">Nuova password</label>
      <input
        id="newPwd"
        type="password"
        class="text-input"
        [value]="newPwd"
        (input)="newPwd = $any($event.target).value"
        autocomplete="new-password"
      />
    </div>

    <div class="form-group">
      <label for="confirmPwd">Conferma password</label>
      <input
        id="confirmPwd"
        type="password"
        class="text-input"
        [value]="confirmPwd"
        (input)="confirmPwd = $any($event.target).value"
        autocomplete="new-password"
      />
    </div>

    <p class="msg error" [hidden]="!errore">
      {{ errore }}
    </p>

    <p class="msg success" [hidden]="!messaggio">
      {{ messaggio }}
    </p>

    <div class="actions">
      <button
        type="button"
        class="btn-primary"
        [disabled]="loading"
        (click)="onSubmit()"
      >
        {{ loading ? 'Salvataggio in corso...' : 'Salva nuova password' }}
      </button>

      <button
        type="button"
        class="btn-link"
        (click)="tornaAlLogin()"
      >
        Torna al login
      </button>
    </div>
  </div>
</div>
