<mat-dialog-content class="dialog-container">
  <mat-card class="dialog-card">
    <mat-card-header class="dialog-header">
      <mat-card-title class="dialog-title">
        Reimposta password
      </mat-card-title>
    </mat-card-header>

    <mat-card-content class="dialog-content">
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="form-grid">

        <div class="col-4 token-box">
          <span class="token-label">Token:</span>
          <span class="token-value">{{ token }}</span>
        </div>

        <mat-form-field appearance="fill" class="col-2">
          <mat-label>Nuova password</mat-label>
          <input matInput type="password" formControlName="newPwd">
        </mat-form-field>

        <mat-form-field appearance="fill" class="col-2">
          <mat-label>Conferma password</mat-label>
          <input matInput type="password" formControlName="confirmPwd">
        </mat-form-field>

        <div class="msg-error col-4" *ngIf="errore">
          <span>{{ errore }}</span>
        </div>

        <div class="msg-success col-4" *ngIf="messaggio">
          <span>{{ messaggio }}</span>
        </div>

        <div class="button-group col-4">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="!resetForm.valid || loading"
            matTooltip="Salva la nuova password">
            {{ loading ? 'Salvataggio in corso...' : 'Salva nuova password' }}
          </button>

          <button
            mat-stroked-button
            color="basic"
            type="button"
            (click)="tornaAlLogin()">
            Torna al login
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</mat-dialog-content>
