<div class="promo-carousel-container" (mouseenter)="stopCarousel()" (mouseleave)="startCarousel()">
  <img
    *ngFor="let img of images; let i = index"
    [src]="img"
    class="carousel-image"
    [class.active]="i === currentIndex()"
    [alt]="'Immagine ' + (i + 1)"
  />

  <div class="carousel-overlay"></div>

  <button class="hover-zone left" (click)="prevSlide()" aria-label="Previous Image">
    <span class="arrow">❮</span>
  </button>

  <button class="hover-zone right" (click)="nextSlide()" aria-label="Next Image">
    <span class="arrow">❯</span>
  </button>
</div>
