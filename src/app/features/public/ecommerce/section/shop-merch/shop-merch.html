<div class="shop-section">
  <div class="collection-hero">
    <img class="hero-bg" src="foto/merch/collezione.png" alt="Collezione Zoo Safari">
    <img class="hero-bg hero-bg-2" src="foto/merch/indossate.png" alt="Magliette indossate">
    <div class="collection-overlay"></div>
    <div class="collection-text">
      <h2>Collezione Wildlife Conservation</h2>
      <p>Ogni acquisto sostiene la conservazione della fauna selvatica</p>
    </div>
  </div>

  <div class="products-toolbar">
    <div class="toolbar-left">
      <label class="toolbar-label">
        Categoria
        <select
          class="toolbar-select"
          [value]="selectedCategory()"
          (change)="selectedCategory.set($any($event.target).value)"
        >
          <option value="">Tutte le categorie</option>
          <option *ngFor="let cat of categories()" [value]="cat">
            {{ cat }}
          </option>
        </select>
      </label>
    </div>

    <div class="toolbar-right">
      <label class="toolbar-label">
        Cerca
        <input
          type="text"
          class="toolbar-input"
          placeholder="Nome o descrizione..."
          [value]="searchTerm()"
          (input)="searchTerm.set($any($event.target).value)"
        >
      </label>

      <label class="toolbar-label">
        Ordina per
        <select
          class="toolbar-select"
          [value]="sortBy()"
          (change)="sortBy.set($any($event.target).value)"
        >
          <option value="none">Predefinito</option>
          <option value="priceAsc">Prezzo: dal più basso</option>
          <option value="priceDesc">Prezzo: dal più alto</option>
        </select>
      </label>
    </div>
  </div>

  <div class="products-wrapper">
    <ng-container *ngFor="let gruppo of prodottiPerCategoriaFiltrati()">
      <div class="section-title">{{ gruppo.categoria }}</div>

      <div class="product-grid">
        <div class="product-card" *ngFor="let prodotto of gruppo.prodotti">
          <img
            [src]="getImageUrl(prodotto)"
            [alt]="prodotto.nome"
            (error)="onImageError($event)"
          >

          <div class="card-label">
            <span class="label-title">{{ prodotto.nome }}</span>
            <span class="label-price">€ {{ prodotto.prezzo | number:'1.2-2' }}</span>
          </div>

          <button class="buy-btn" (click)="addToCart(prodotto)">
            <span class="material-icons">add_shopping_cart</span>
            Acquista
          </button>
        </div>
      </div>
    </ng-container>
  </div>
</div>
