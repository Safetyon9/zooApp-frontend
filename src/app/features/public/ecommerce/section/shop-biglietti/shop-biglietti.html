<div class="shop-container">

  <h1 class="title">Biglietti disponibili</h1>

  <div class="grid">

    @for (b of biglietti; track b.id) {

      <mat-card class="ticket-card" appearance="outlined">

        <div class="img-wrapper">
          @if (b.urlImmagine) {
            <img [src]="imgBaseUrl + b.urlImmagine">
          } @else {
            <img src="no_image.png" />
          }
        </div>

        <mat-card-content>

          <h2 class="name">{{ b.nome }}</h2>

          <p class="type">
            {{ b.tipoNome }}
          </p>

          <div class="price">
            € {{ b.prezzo }}
          </div>

        </mat-card-content>

        <mat-card-actions class="actions">

          <button
            mat-raised-button
            color="primary"
            (click)="addToCart(b)">
            Aggiungi al carrello
          </button>

        </mat-card-actions>

      </mat-card>

    }

  </div>

</div>
