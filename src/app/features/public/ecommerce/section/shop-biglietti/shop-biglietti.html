<div class="shop-section">
  @if (step === 1) {
    <div class="section-title">Biglietti</div>
    <div class="product-grid">
      <div class="product-card">
        <img src="foto/animal-1.jpg" alt="Biglietto Standard">
        <div class="card-label">
          <span class="label-title">Biglietto Standard</span>
          <span class="label-price">€ 25.00</span>
        </div>
        <button class="buy-btn" (click)="selectTicket({id: 1, nome: 'Biglietto Standard', prezzo: 25, immagine: 'foto/animal-1.jpg'})">
          <span class="material-icons">add_shopping_cart</span>
          Acquista
        </button>
      </div>

      <div class="product-card">
        <img src="foto/animal-2.jpg" alt="Biglietto Famiglia">
        <div class="card-label">
          <span class="label-title">Biglietto Famiglia</span>
          <span class="label-price">€ 60.00</span>
        </div>
        <button class="buy-btn" (click)="selectTicket({id: 2, nome: 'Biglietto Famiglia', prezzo: 60, immagine: 'foto/animal-2.jpg'})">
          <span class="material-icons">add_shopping_cart</span>
          Acquista
        </button>
      </div>

      <div class="product-card">
        <img src="foto/animal-3.jpg" alt="Biglietto Ridotto">
        <div class="card-label">
          <span class="label-title">Biglietto Ridotto</span>
          <span class="label-price">€ 15.00</span>
        </div>
        <button class="buy-btn" (click)="selectTicket({id: 3, nome: 'Biglietto Ridotto', prezzo: 15, immagine: 'foto/animal-3.jpg'})">
          <span class="material-icons">add_shopping_cart</span>
          Acquista
        </button>
      </div>
    </div>

    <div class="section-title">Pass Annuali</div>
    <div class="product-grid">
      <div class="product-card tall">
        <img src="foto/pass-annuale.jpg" alt="Pass Annuale">
        <div class="card-label">
          <span class="label-title">Pass Annuale</span>
          <span class="label-price">€ 95.00</span>
        </div>
        <button class="buy-btn" (click)="selectTicket({id: 4, nome: 'Pass Annuale', prezzo: 95, immagine: 'foto/pass-annuale.jpg'})">
          <span class="material-icons">add_shopping_cart</span>
          Acquista
        </button>
      </div>
    </div>
  } @else {
    <div class="date-selection-container">
      <div class="selection-card">
        <button class="btn-back" (click)="reset()">
          <span class="material-icons">arrow_back</span>
          Indietro
        </button>

        <div class="selected-info">
          <img [src]="selectedTicket.immagine" alt="Ticket selection">
          <div class="text">
            <h2>{{ selectedTicket.nome }}</h2>
            <p>Seleziona la data della visita</p>
          </div>
        </div>

        <div class="date-picker-mock">
          <input type="date" [(ngModel)]="selectedDate" class="date-input">
        </div>

        <button class="btn-confirm" [disabled]="!selectedDate" (click)="confirmPurchase()">
          Conferma e Aggiungi al Carrello
        </button>
      </div>
    </div>
  }
</div>
