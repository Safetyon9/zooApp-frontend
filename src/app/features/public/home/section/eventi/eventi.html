<div class="eventi-container" id="eventi-section">

  <div class="eventi-left">
    <div class="eventi-header">
      <h2>Prossimi Eventi 🎉</h2>
      <p>Scopri le attività in programma nel nostro zoo.</p>
    </div>

    <div class="eventi-list">
      <div class="evento-card" *ngFor="let event of events()">
        <span class="evento-icon">{{ event.icon }}</span>
        <div class="evento-info">
          <h3>{{ event.title }}</h3>
          <span class="evento-date">📅 {{ event.date }}</span>
          <p>{{ event.description }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="eventi-right">
    <video autoplay loop muted playsinline class="local-video">
      <source src="video/zoo-video.mp4" type="video/mp4">
    </video>
  </div>

</div>
