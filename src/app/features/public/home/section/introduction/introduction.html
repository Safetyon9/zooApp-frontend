<div class="introduction-container">

  <div class="hero-content">
    <h1>{{ title() }}</h1>
    <p>Esplora il Regno Animale e vivi un viaggio indimenticabile tra le specie più affascinanti del pianeta.</p>

    <div class="hero-buttons">
      <button class="primary-btn">Esplora gli animali</button>
    </div>
  </div>

  <div class="animal-carousel">

    <img
      *ngFor="let img of animalImages; let i = index"
      [src]="img"
      class="carousel-image"
      [class.active]="i === currentImageIndex()"
      [alt]="'Immagine ' + (i + 1)"
    />

    <div class="carousel-overlay"></div>

    <button class="hover-zone left" (click)="prevImage()" aria-label="Previous Image">
      <span class="arrow">❮</span>
    </button>

    <button class="hover-zone right" (click)="nextImage()" aria-label="Next Image">
      <span class="arrow">❯</span>
    </button>

  </div>

</div>
