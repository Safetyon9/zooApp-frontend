<div class="page-container">
  <mat-card class="admin-card" appearance="outlined">

    <mat-card-header class="header-row">
      <mat-card-title>Gestione Metodi di Pagamento</mat-card-title>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="onCreate()">
        Nuovo Metodo
      </button>
    </mat-card-header>

    <mat-divider></mat-divider>

    <mat-card-content>

      @if (loading) {
        <div class="empty-state">
          <p>Caricamento metodi di pagamento...</p>
        </div>
      } @else {

        <div class="table-wrapper">
          <table class="accounts-table">

            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Provider</th>
                <th>Azioni</th>
              </tr>
            </thead>

            <tbody>
              @for (m of metodi; track m.id) {
                <tr>
                  <td>{{ m.id || '-' }}</td>
                  <td>{{ m.nome || '-' }}</td>
                  <td>{{ m.provider || '-' }}</td>

                  <td class="actions-cell">
                    <button
                      type="button"
                      class="text-button"
                      (click)="onUpdate(m)">
                      Modifica
                    </button>

                    <button
                      type="button"
                      class="text-button text-button-danger"
                      (click)="onDelete(m)">
                      Elimina
                    </button>
                  </td>
                </tr>
              } @empty {
                <tr>
                  <td colspan="4" class="empty-cell">
                    Nessun metodo di pagamento trovato.
                  </td>
                </tr>
              }
            </tbody>

          </table>
        </div>
      }

    </mat-card-content>

  </mat-card>
</div>
