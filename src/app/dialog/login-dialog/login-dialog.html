<div class="container">
    <h1>Login</h1>
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        
        <mat-form-field>
            <mat-label>Username</mat-label>
            <input matInput type="text" name="username" placeholder="username" ngModel required>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Password</mat-label>
            <input matInput type="password" name="password" placeholder="password" ngModel required>
        </mat-form-field>

        <p style="color: red;">{{msg()}}</p>
        
        <div class="button-group">
            <button class="btn btn-primary" type="submit" [disabled]="!loginForm.valid">Accedi</button>
            <button class="btn btn-secondary" type="button" (click)="registrazione()">Registrati</button>
        </div>

    </form>
</div>
