<mat-dialog-content class="dialog-container">
  <button mat-icon-button mat-dialog-close class="dialog-close-btn">
    <mat-icon>close</mat-icon>
  </button>

  <h2 mat-dialog-title>Login</h2>

  <mat-dialog-content class="dialog-inner">
    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      <mat-form-field appearance="fill">
        <mat-label>Username</mat-label>
        <input matInput type="text" name="username" placeholder="username" ngModel required>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="pwd" placeholder="password" ngModel required>
      </mat-form-field>

      <p>{{ msg() }}</p>

      <div class="button-group">
        <button class="btn btn-primary" type="submit" [disabled]="!loginForm.valid">
          Login
        </button>
        <button
          type="button"
          class="btn btn-secondary"
          (click)="registrazione()"
          matTooltip="Nuovo utente? Registrati.">
          Registrati
        </button>
      </div>
    </form>
  </mat-dialog-content>
</mat-dialog-content>
