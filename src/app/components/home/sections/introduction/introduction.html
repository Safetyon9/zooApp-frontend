<div class="hero-container">

  <div class="hero-content">
    <h1>Benvenuto allo Zoo</h1>
    <p>Esplora il Regno Animale, vivi un viaggio indimenticabile tra le specie più affascinanti del pianeta.</p>

    <div class="hero-buttons">
      <button class="primary-btn">Esplora gli animali</button>
      <button class="secondary-btn">Acquista biglietti</button>
    </div>
  </div>

  <div class="turtle-carousel">

    <img 
      *ngFor="let img of turtleImages; let i = index"
      [src]="img.src"
      [alt]="img.alt"
      class="carousel-image"
      [class.active]="i === currentIndex"
    />

    <div class="carousel-overlay"></div>

    <button class="hover-zone left" (click)="prevImage()" aria-label="Previous Image">
      <span class="arrow">❮</span>
    </button>

    <button class="hover-zone right" (click)="nextImage()" aria-label="Next Image">
      <span class="arrow">❯</span>
    </button>

  </div>

</div>
